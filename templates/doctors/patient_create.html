{% extends 'core/base.html' %}

{% block title %}Create Patient{% endblock %}

{% block content %}
<div class="container py-5">

    <div class="card shadow-sm p-4 mx-auto" style="max-width: 500px;">
        <h4 class="mb-4 text-center">Create New Patient</h4>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" class="form-control" value="{{ phone }}" readonly>
            </div>

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Gender</label>
                <select name="gender" class="form-select" required>
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="col-md-6">
                <div class="form-floating">
                    <input type="date" class="form-control" id="birth_date" name="b_date" required>
                    <label for="birth_date">Date of birth *</label>
                </div>
            </div>
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-success">
                    Create Patient
                </button>
            </div>
        </form>

        <div class="text-center mt-3">
            <a href="{% url 'doctors:doctor_dashboard' %}" class="text-muted">
                Cancel
            </a>
        </div>
    </div>

</div>
{% endblock %}
