{% extends "patients/base.html" %}

{% block content %}
<div class="container mt-4" style="max-width: 800px;">

    <div class="card">
        <div class="card-body">

            <h5 class="mb-3">Document Details</h5>

            <p>
                <strong>Title:</strong> {{ document.title }} <br>
                <strong>Uploaded:</strong> {{ document.uploaded_at|date:"Y-m-d H:i" }}
            </p>

            <hr>

            <div class="mb-3">
                <a href="{{ document.file.url }}"
                   class="btn btn-success"
                   target="_blank">
                    Open / Download Document
                </a>
            </div>

            <a href="{% url 'patients:documents' %}"
               class="btn btn-secondary btn-sm">
                Back to Documents
            </a>

        </div>
    </div>

</div>
{% endblock %}
