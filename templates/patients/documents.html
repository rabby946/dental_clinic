{% extends "patients/base.html" %}

{% block content %}
<div class="container mt-4">

    <h4 class="mb-3">My Documents</h4>

    <table class="table table-bordered table-sm">
        <thead>
            <tr>
                <th>Title</th>
                <th>Uploaded At</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for doc in documents %}
            <tr>
                <td>{{ doc.title }}</td>
                <td>{{ doc.uploaded_at|date:"Y-m-d" }}</td>
                <td>
                    <a href="{% url 'patients:document_details' doc.id %}"
                       class="btn btn-sm btn-primary">
                        View
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">No documents uploaded yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>
{% endblock %}
