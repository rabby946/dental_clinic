{% extends 'core/base.html' %}
{% load static %}

{% block title %}Add Medicine{% endblock %}

{% block content %}
<div class="container py-4">

    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <h4 class="fw-bold mb-4 text-center">
                        ➕ Add New Medicine
                    </h4>

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Medicine Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Type</label>
                            <input type="text" name="type" class="form-control" placeholder="Tablet / Syrup / Injection" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Strength</label>
                            <input type="text" name="strength" class="form-control" placeholder="500mg / 10ml" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Brand</label>
                            <input type="text" name="brand" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Instructions</label>
                            <textarea name="instructions" class="form-control" rows="3"
                                placeholder="After meal / Twice daily / etc."></textarea>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'medicines:list' %}" class="btn btn-outline-secondary">
                                ← Back
                            </a>
                            <button type="submit" class="btn btn-primary">
                                Save Medicine
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>

</div>
{% endblock %}
